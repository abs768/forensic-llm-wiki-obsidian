name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check .

      - name: Run tests
        env:
          FORENSIC_WIKI_LLM: mock
        run: python -m pytest -q

      - name: Smoke-test the demo flow
        env:
          FORENSIC_WIKI_LLM: mock
        run: |
          python fw.py ingest raw_sources/case_001 --apply
          python fw.py query case_001 "Is this confirmed malware?"
          python fw.py evolve case_002_evolving
          python fw.py benchmark case_002_evolving > /tmp/benchmark.md
          grep -q "LLM Wiki" /tmp/benchmark.md
